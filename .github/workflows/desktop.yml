name: Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing git tag to rebuild and publish"
        required: true
        type: string
      build_scope:
        description: "Targets to build"
        required: true
        default: "windows"
        type: choice
        options:
          - windows
          - all

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name }}-${{ github.event.inputs.release_tag || 'tag-push' }}
  cancel-in-progress: false

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        run: |
          cd desktop
          npm ci
      - name: Lint
        run: |
          cd desktop
          npm run lint
      - name: Type check
        run: |
          cd desktop
          # Skip type check for now if tsc fails on empty project
          # npx tsc --noEmit

  prepare-release:
    needs: lint-frontend
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "No release tag resolved" >&2
            exit 1
          fi

          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure git tag exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${{ steps.tag.outputs.tag_name }}" >/dev/null

      - name: Create or publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag_name }}"
          TITLE="RAGKIT Desktop ${TAG}"
          NOTES="See the assets to download this version and install."

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --draft=false --prerelease=false --title "${TITLE}" --notes "${NOTES}"
          else
            gh release create "${TAG}" --draft=false --prerelease=false --title "${TITLE}" --notes "${NOTES}"
          fi

  build-windows:
    needs: prepare-release
    if: github.event_name != 'workflow_dispatch' || inputs.build_scope == 'windows' || inputs.build_scope == 'all'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install frontend dependencies
        run: |
          cd desktop
          npm ci

      - name: Build Python Backend
        shell: bash
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[desktop]"
          pyinstaller ragkit-backend.spec

      - name: Prepare Sidecar
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp "dist/ragkit-backend.exe" "desktop/src-tauri/binaries/ragkit-backend-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: 'RAGKIT Desktop ${{ needs.prepare-release.outputs.tag_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ''

  build-other-platforms:
    needs: prepare-release
    if: github.event_name != 'workflow_dispatch' || inputs.build_scope == 'all'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: '-b deb,appimage'
            target_suffix: 'x86_64-unknown-linux-gnu'
          - platform: 'macos-15-intel'
            args: '--target x86_64-apple-darwin'
            target_suffix: 'x86_64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
            target_suffix: 'aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets || (matrix.platform == 'macos-15-intel' && 'x86_64-apple-darwin' || '') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: |
          cd desktop
          npm ci

      - name: Build Python Backend
        shell: bash
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[desktop]"
          pyinstaller ragkit-backend.spec

      - name: Prepare Sidecar
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp "dist/ragkit-backend" "desktop/src-tauri/binaries/ragkit-backend-${{ matrix.target_suffix }}"

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: 'RAGKIT Desktop ${{ needs.prepare-release.outputs.tag_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
